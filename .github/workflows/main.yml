name: Repackage Latest UGC Release

on:
  schedule:
    # Trigger daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force release regardless of checks'
        required: false
        type: boolean
        default: true

# Essential permission to allow the workflow to publish a release
permissions:
  contents: write  

jobs:
  check-and-process:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check latest releases & Get Asset Info
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 1. Fetch latest release info from upstream
          RELEASE_INFO=$(curl -s https://api.github.com/repos/ungoogled-software/ungoogled-chromium-windows/releases/latest)
          UGC_TAG=$(echo "$RELEASE_INFO" | jq -r '.tag_name')
          
          # 2. Fetch the latest release tag from our local repository natively
          LOCAL_TAG=$(gh release view --json tagName -q .tagName 2>/dev/null || echo "none")
          
          if [ "$UGC_TAG" = "null" ] || [ -z "$UGC_TAG" ]; then
            echo "::error::Failed to fetch upstream tag"
            exit 1
          fi
          
          # 3. Compare releases to either proceed or abort
          IS_MANUAL="${{ github.event_name == 'workflow_dispatch' }}"
          FORCE_RELEASE="${{ inputs.force_release }}"
          
          if [ "$IS_MANUAL" = "true" ] && [ "$FORCE_RELEASE" = "true" ]; then
            echo "Force release triggered manually."
            echo "should_process=true" >> $GITHUB_OUTPUT
          elif [ "$UGC_TAG" = "$LOCAL_TAG" ]; then
            echo "::notice::Latest release ($UGC_TAG) is identical on both repositories. Aborting."
            echo "should_process=false" >> $GITHUB_OUTPUT
            exit 0 # Safely stop step execution here since we're aborting
          else
            echo "New release found: $UGC_TAG (Local was: $LOCAL_TAG)"
            echo "should_process=true" >> $GITHUB_OUTPUT
          fi
          
          # 4. Extract explicit paths and names from the JSON assets exactly as originally intended
          ASSET_URL=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name | contains("windows_x64.zip")) | .browser_download_url')
          ASSET_NAME=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name | contains("windows_x64.zip")) | .name')
          PUBLISHED_AT=$(echo "$RELEASE_INFO" | jq -r '.published_at')
          
          # 5. Restore original robust regex for asset version extraction
          # (Upstream tags can sometimes differ from the definitive asset filename)
          VERSION=$(echo "$ASSET_NAME" | grep -oP '(?<=ungoogled-chromium_)[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+')
          REVISION=$(echo "$ASSET_NAME" | grep -oP '(?<=-)[0-9]+\.[0-9]+(?=_windows)')
          
          echo "ugc_tag=$UGC_TAG" >> $GITHUB_OUTPUT
          echo "asset_url=$ASSET_URL" >> $GITHUB_OUTPUT
          echo "published_at=$PUBLISHED_AT" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "revision=$REVISION" >> $GITHUB_OUTPUT

      - name: Download and repackage
        if: steps.check.outputs.should_process == 'true'
        run: |
          wget -q "${{ steps.check.outputs.asset_url }}" -O original.zip
          
          mkdir -p temp_extract chrome-win
          unzip -q original.zip -d temp_extract
          
          # Move inner directory contents into chrome-win seamlessly
          INNER_DIR=$(find temp_extract -mindepth 1 -maxdepth 1 -type d)
          mv "$INNER_DIR"/* chrome-win/
          
          # Zip final asset
          zip -q -r chrome-win.zip chrome-win
          
          # Clean up temp files locally to save workspace space
          rm -rf temp_extract original.zip

      - name: Create updateurl.txt
        if: steps.check.outputs.should_process == 'true'
        run: |
          TIMESTAMP=$(date +%s)
          COMMIT=$(git rev-parse HEAD)
          
          cat > updateurl.txt << EOF
          browser=chromium;os=windows;architecture=64-bit;timestamp=$TIMESTAMP;editor=ungoogled;channel=stable;repository=https://github.com/${{ github.repository }}/releases;download=https://github.com/${{ github.repository }}/releases/latest/download/chrome-win.zip;version=${{ steps.check.outputs.version }};revision=${{ steps.check.outputs.revision }};commit=$COMMIT
          EOF
          
          # Remove formatting whitespace
          sed -i 's/^[[:space:]]*//' updateurl.txt

      - name: Publish GitHub Release
        if: steps.check.outputs.should_process == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.check.outputs.ugc_tag }}" \
            chrome-win.zip \
            updateurl.txt \
            --title "${{ steps.check.outputs.version }}-${{ steps.check.outputs.revision }}" \
            --notes "Ungoogled Chromium - Version ${{ steps.check.outputs.version }}-${{ steps.check.outputs.revision }}
          
          Original release: https://github.com/ungoogled-software/ungoogled-chromium-windows/releases/tag/${{ steps.check.outputs.ugc_tag }}
          
          Published on: ${{ steps.check.outputs.published_at }}"